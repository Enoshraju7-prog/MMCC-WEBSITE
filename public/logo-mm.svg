<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F0D98C"/>
      <stop offset="45%"  stop-color="#C9A96E"/>
      <stop offset="100%" stop-color="#9A7040"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#161616"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#C9A96E" stop-opacity="0.7"/>
      <stop offset="50%"  stop-color="#E8C98A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#C9A96E" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="52%" r="38%">
      <stop offset="0%"   stop-color="#C9A96E" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#C9A96E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="22" fill="url(#bgGrad)"/>
  <rect width="400" height="400" rx="22" fill="url(#centerGlow)"/>

  <!-- Outer gold border -->
  <rect x="1" y="1" width="398" height="398" rx="21.5"
        fill="none" stroke="url(#borderGrad)" stroke-width="1.5"/>

  <!-- Inner thin frame -->
  <rect x="13" y="13" width="374" height="374" rx="12"
        fill="none" stroke="#C9A96E" stroke-width="0.6" opacity="0.14"/>

  <!-- Corner accents -->
  <path d="M 13 46 L 13 13 L 46 13"
        fill="none" stroke="#C9A96E" stroke-width="1.2" opacity="0.45"/>
  <path d="M 387 354 L 387 387 L 354 387"
        fill="none" stroke="#C9A96E" stroke-width="1.2" opacity="0.45"/>

  <!-- MM -->
  <text x="200" y="246"
    font-family="Georgia, 'Palatino Linotype', Palatino, serif"
    font-size="178" font-weight="bold"
    text-anchor="middle"
    fill="url(#goldText)"
    letter-spacing="-10">MM</text>

  <!-- Separator -->
  <line x1="148" y1="264" x2="252" y2="264"
        stroke="#C9A96E" stroke-width="0.75" opacity="0.45"/>

  <!-- CAR CARE -->
  <text x="200" y="290"
    font-family="'Courier New', Courier, monospace"
    font-size="15.5" font-weight="normal"
    text-anchor="middle"
    fill="#C9A96E"
    letter-spacing="8"
    opacity="0.68">CAR CARE</text>
</svg>
