name: Sync Google Reviews

on:
  schedule:
    - cron: '27 17 * * *'  # 11:00pm IST every night (5:27pm UTC)
  workflow_dispatch:       # allow manual trigger from GitHub

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and add new reviews
        env:
          GOOGLE_PLACES_KEY: ${{ secrets.GOOGLE_PLACES_KEY }}
        run: node scripts/sync-reviews.mjs

      - name: Commit if new reviews were added
        run: |
          git config user.name "reviews-bot"
          git config user.email "bot@mmcarcarekakinada.co.in"
          git add lib/reviews.ts
          git diff --staged --quiet && echo "No new reviews." || (git commit -m "chore: sync latest Google reviews" && git push)
